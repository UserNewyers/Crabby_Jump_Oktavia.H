<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crabby Jump - Neon Ocean Adventure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Intro Screen -->
        <div id="intro-screen" class="overlay">
            <div class="content">
                <h1>CRABBY JUMP</h1>
                <p>Avoid the rocks and survive the neon waves!</p>
                <button id="start-btn" class="neon-btn">PLAY GAME</button>
                <div class="controls-hint">Press <span>SPACE</span> to Jump</div>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div id="score-container">Score: <span id="score">0</span></div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay hidden">
            <div class="content">
                <h1 class="game-over-text">GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="neon-btn">RETRY</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
